version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: arc-registry-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: arc
      POSTGRES_PASSWORD: arc_dev_password
      POSTGRES_DB: arc_registry
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    container_name: arc-registry-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
